    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#fff;--bg2:#f8fafc;--bg3:#f1f5f9;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;--accent:#4f46e5;--accent2:#818cf8;--accentbg:#eef2ff;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow2:0 10px 15px -3px rgba(0,0,0,.1)}
        [data-theme=dark]{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#818cf8;--accent2:#a5b4fc;--accentbg:#1e1b4b;--border:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow2:0 10px 15px -3px rgba(0,0,0,.4)}

        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:.3s}
        a{color:inherit;text-decoration:none}
        button{font-family:inherit;cursor:pointer;border:none;background:none}
        .container{max-width:1400px;margin:0 auto;padding:0 1rem}
        .header{background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
        .header-inner{display:flex;justify-content:space-between;align-items:center;padding:1rem 0}
        .logo{display:flex;align-items:center;gap:.75rem}
        .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#4f46e5,#818cf8);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.25rem}
        .logo-title{font-size:1.25rem;font-weight:700}
        .logo-sub{font-size:.75rem;color:var(--text2)}
        .theme-btn{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--text);transition:.2s}
        .theme-btn:hover{background:var(--accentbg);color:var(--accent)}
        .theme-btn svg{width:20px;height:20px}
        .mobile-cats{display:none;padding:.75rem 0;overflow-x:auto;gap:.5rem;scrollbar-width:none}
        .mobile-cats::-webkit-scrollbar{display:none}
        .mobile-cat{flex-shrink:0;padding:.5rem 1rem;border-radius:20px;font-size:.875rem;background:var(--bg3);color:var(--text2);transition:.2s}
        .mobile-cat.active{background:var(--accent);color:#fff}
        .hero{background:var(--bg2);padding:2.5rem 0;text-align:center}
        .search-box{max-width:640px;margin:0 auto 1.5rem;position:relative}
        .search-input{width:100%;padding:1rem 1.25rem 1rem 3.25rem;font-size:1rem;border:2px solid var(--border);border-radius:16px;background:var(--bg);color:var(--text);outline:none;transition:.2s;box-shadow:var(--shadow)}
        .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accentbg),var(--shadow2)}
        .search-input::placeholder{color:var(--text3)}
        .search-icon{position:absolute;left:1.25rem;top:50%;transform:translateY(-50%);color:var(--text3);width:20px;height:20px}
        .hot-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:.5rem}
        .hot-tag{padding:.375rem .875rem;font-size:.8125rem;color:var(--text2);background:var(--bg3);border-radius:20px;transition:.2s}
        .hot-tag:hover{color:var(--accent);background:var(--accentbg)}
        .stats{display:flex;justify-content:center;gap:2rem;padding:1.5rem 0;flex-wrap:wrap}
        .stat{display:flex;align-items:center;gap:.5rem;color:var(--text2);font-size:.875rem}
        .stat svg{width:18px;height:18px;color:var(--accent)}
        .stat span{font-weight:600;color:var(--text)}
        .main{padding:1.5rem 0 3rem}
        .main-layout{display:flex;gap:2rem}
        .sidebar{width:260px;flex-shrink:0;position:sticky;top:85px;height:fit-content;max-height:calc(100vh - 100px);overflow-y:auto}
        .cat-list{display:flex;flex-direction:column;gap:.25rem}
        .cat-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 1rem;border-radius:10px;color:var(--text2);transition:.2s;cursor:pointer;position:relative}
        .cat-item:hover{background:var(--bg3);color:var(--text)}
        .cat-item.active{background:var(--accentbg);color:var(--accent)}
        .cat-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:24px;background:var(--accent);border-radius:0 2px 2px 0}
        .cat-emoji{font-size:1.125rem;width:24px;text-align:center}
        .cat-name{flex:1;font-size:.9375rem;font-weight:500}
        .cat-count{font-size:.75rem;padding:.125rem .5rem;background:var(--bg3);border-radius:10px;color:var(--text3)}
        .cat-item.active .cat-count{background:var(--accent);color:#fff}
        .content{flex:1;min-width:0}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem}
        .card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:.2s;display:flex;flex-direction:column;gap:.75rem}
        .card:hover{transform:translateY(-2px);box-shadow:var(--shadow2);border-color:var(--accent)}
        .card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem}
        .card-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.125rem;flex-shrink:0}
        .card-info{flex:1;min-width:0}
        .card-name{font-size:1rem;font-weight:600;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card-rating{color:#f59e0b;font-size:.8125rem}
        .card-desc{font-size:.875rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.5rem}
        .card-tag{padding:.25rem .625rem;font-size:.6875rem;border-radius:6px;background:var(--bg3);color:var(--text2)}
        .price-tag{padding:.25rem .625rem;font-size:.6875rem;border-radius:6px;font-weight:500}
        .price-free{background:#dcfce7;color:#16a34a}
        [data-theme=dark] .price-free{background:#14532d;color:#4ade80}
        .price-paid{background:#fef3c7;color:#d97706}
        [data-theme=dark] .price-paid{background:#78350f;color:#fbbf24}
        .price-mixed{background:#e0e7ff;color:#4f46e5}
        [data-theme=dark] .price-mixed{background:#312e81;color:#a5b4fc}
        .empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--text3)}
        .empty h3{font-size:1.125rem;font-weight:600;color:var(--text2);margin:.5rem 0}
        .footer{background:var(--bg2);border-top:1px solid var(--border);padding:1.5rem 0;text-align:center}
        .footer-content{display:flex;align-items:center;justify-content:center;gap:1.5rem;flex-wrap:wrap}
        .footer-text{font-size:.875rem;color:var(--text3)}
        .footer-links{display:flex;gap:1.5rem}
        .footer-link{font-size:.875rem;color:var(--text2);transition:.2s}
        .footer-link:hover{color:var(--accent)}
        @media(max-width:768px){.mobile-cats{display:flex}.sidebar{display:none}.main-layout{flex-direction:column}.grid{grid-template-columns:1fr}.hero{padding:1.5rem 0}.logo-sub{display:none}}
        @media(max-width:480px){.container{padding:0 .75rem}.search-input{padding:.875rem 1rem .875rem 2.75rem}.card{padding:1rem}.card-icon{width:40px;height:40px;font-size:1rem}.footer-content{flex-direction:column;gap:.75rem}}
    </style>
</head>

    const f=tools.filter(t=>{const mC=curCat==='all'||t.c===curCat;const mS=query===''||t.n.toLowerCase().includes(query.toLowerCase())||t.d.toLowerCase().includes(query.toLowerCase());return mC&&mS;});
    if(f.length===0){$('#grid').innerHTML='<div class="empty"><h3>未找到相关工具</h3><p>试试其他关键词或分类</p></div>';return;}
    $('#grid').innerHTML=f.map(t=>`<a href="${t.u}" target="_blank" class="card"><div class="card-header"><div class="card-icon" style="background:linear-gradient(135deg,${t.co},${adjustColor(t.co,20)})">${t.n.charAt(0)}</div><div class="card-info"><div class="card-name">${t.n}</div><span class="card-rating">⭐ ${t.r}</span></div></div><p class="card-desc">${t.d}</p><div class="card-footer"><span class="card-tag">${getCatName(t.c)}</span><span class="price-tag price-${getPriceClass(t.p)}">${t.p}</span></div></a>`).join('');
}
function setupEvents(){
    $('#themeBtn').addEventListener('click',toggleTheme);
    $('#catList').addEventListener('click',e=>{const i=e.target.closest('.cat-item');if(i){curCat=i.dataset.cat;renderCats();renderMCats();renderTools()}});
    $('#mobileCats').addEventListener('click',e=>{const b=e.target.closest('.mobile-cat');if(b){curCat=b.dataset.cat;renderCats();renderMCats();renderTools()}});
    $('#searchInput').addEventListener('input',e=>{query=e.target.value.trim();renderTools()});
    $$('.hot-tag').forEach(t=>t.addEventListener('click',()=>{$('#searchInput').value=t.dataset.s;query=t.dataset.s;renderTools()}));
}
document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
